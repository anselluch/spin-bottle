<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крути бутылочку</title>

    <!-- Подключаем Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Наши стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Экран входа (Сцена 1) -->
        <div id="entryScreen" class="screen active">
            <div class="container">
                <h1 class="game-title">🍾 Крути бутылочку</h1>

                <!-- Основная кнопка -->
                <button id="joinBtn" class="btn-primary btn-large">
                    Присоединиться к комнате
                </button>

                <!-- Статус комнаты (скрыт по умолчанию) -->
                <div id="roomStatus" style="display: none;">
                    <p>Ты в комнате: <span id="roomName">Комната 1</span></p>
                    <button id="playBtn" class="btn-primary">Играть!</button>
                </div>

                <!-- Рекордсмены -->
                <div class="leaderboard">
                    <h3>🏆 Рекордсмены</h3>
                    <div id="leaderboardList">
                        <p class="text-muted">Пока нет данных</p>
                    </div>
                </div>

                <!-- Магазин -->
                <button id="shopBtn" class="btn-secondary">🛒 Магазин</button>

                <!-- Статистика -->
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Всего вращений:</span>
                        <span class="stat-value" id="totalSpins">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Мэтчей:</span>
                        <span class="stat-value" id="totalMatches">0</span>
                    </div>
                </div>

                <!-- Приватность -->
                <p class="privacy-text">🔒 Твои данные не передаются третьим лицам</p>
            </div>
        </div>

        <!-- Игровой экран (Сцена 2) -->
        <div id="gameScreen" class="screen">
            <div class="container">
                <h2>Игра</h2>

                <!-- Бутылочка -->
                <div class="bottle-container">
                    <div id="bottle" class="bottle">
                        🍾
                    </div>
                </div>

                <!-- Кнопка кручения -->
                <button id="spinBtn" class="btn-primary btn-large">
                    🔄 Крутить бутылочку
                </button>

                <!-- Результат -->
                <div id="spinResult" style="display: none;">
                    <p id="resultText">Бутылочка указала на: Игрок</p>
                    <button id="reactBtn" class="btn-success">❤️ Отправить реакцию</button>
                </div>

                <!-- Выход из комнаты -->
                <button id="leaveBtn" class="btn-danger">🚪 Выйти из комнаты</button>
            </div>
        </div>

        <!-- Экран матча (Сцена 3) -->
        <div id="matchScreen" class="screen">
            <div class="container match-container">
                <div class="match-animation">
                    💖
                </div>
                <h1 class="match-title">У вас взаимный интерес!</h1>
                <p id="matchPartner">С кем: Игрок</p>
                <button id="openChatBtn" class="btn-primary btn-large">
                    💬 Открыть чат в Telegram
                </button>
                <button id="continueBtn" class="btn-secondary">Продолжить игру</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
